[platformio]
extra_configs = secret.ini
default_envs = m5stack-atoms3-lite

[base]
extra_scripts = 
    pre:inject_version.py
build_flags =
    -DUSE_QUEUE=${secret.use_queue}
    -DUSE_AES=${secret.use_aes}    
lib_deps = 

[ota]
platform = espressif32
framework = arduino
upload_protocol = espota
upload_flags = 
    --auth="${secret.ota_password}"
    --host_port=22564 

[s3core]
platform = espressif32
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
extra_scripts = 
    ${base.extra_scripts}
build_flags =
    ${base.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DSERIAL_SPEED=${s3core.monitor_speed}
    -DPREFS_NAME='${secret.prefs_name}'
    ; -DCORE_DEBUG_LEVEL=0
    ; -DLOG_SERIAL=Serial
; monitor_filters = esp32_exception_decoder
; build_type = debug
lib_deps = 
    ${base.lib_deps}
    TaskScheduler=https://github.com/arkhipenko/TaskScheduler
test_ignore = test_native

[m5stack]
extends = s3core
build_flags =
    ${s3core.build_flags}
    -DESP32S3=1
    -DIS_M5=1
lib_deps =
    ${s3core.lib_deps}
    M5Unified=https://github.com/m5stack/M5Unified

[env:m5stack-atoms3-lite]
extends = m5stack
board = m5stack-atoms3
build_flags =
    ${m5stack.build_flags}
    -DE32C_BUILD_ID='"m5stack-atoms3-lite"'
    -DHAVE_RTC=0
    -DM_S_DUMMY=1
    -DLOG_SERIAL=Serial
    -DLOG_UDP=1
    ; -DCORE_DEBUG_LEVEL=5
; monitor_filters = esp32_exception_decoder
; build_type = debug

[env:m5stack-atoms3-lite_1_ota_1]
extends = env:m5stack-atoms3-lite, ota
build_flags =
    ${m5stack.build_flags}
    -DE32C_BUILD_ID='"m5stack-atoms3-lite_1_ota"'
    -DHAVE_RTC=0
    -DM_S_DUMMY=1
upload_port = ${ips.m5stack_atoms3_lite_1}

[env:rak11200]
extends = s3core
board = rak11200
build_flags = 
    ${s3core.build_flags}
    -I /home/neal/Workshop/PlatformIO/WisBlock/PlatformIO/RAK_PATCH_V2/rakwireless/variants/rak11200/
    -mfix-esp32-psram-cache-issue
    -DE32C_BUILD_ID='"rak11200"'
    -DHAVE_RTC=0
    -DBOARD_HAS_PSRAM=1

[env:rak11200_1_ota]
extends = env:rak11200, ota
build_flags = 
    ${s3core.build_flags}
    -I /home/neal/Workshop/PlatformIO/WisBlock/PlatformIO/RAK_PATCH_V2/rakwireless/variants/rak11200/
    -mfix-esp32-psram-cache-issue
    -DE32C_BUILD_ID='"rak11200_1_ota"'
    -DHAVE_RTC=0
    -DBOARD_HAS_PSRAM=1
upload_port = ${ips.rak11200_1}

[env:native]
platform = native
test_ignore = test_embedded
extra_scripts = 
    ${base.extra_scripts}
test_build_src = true
build_flags =
    ${base.build_flags}
    -g
    -fsanitize=address
    -DE32C_BUILD_ID='"native"'
    -DHAVE_RTC=0
    -DLOG_STDOUT=1
    ; -DDB_LVL=0xFF
lib_deps =
    ${base.lib_deps}
lib_compat_mode = off
