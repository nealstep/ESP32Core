[platformio]
extra_configs = secret.ini
default_envs = m5stack-atoms3-lite

[base]
extra_scripts = 
    pre:inject_version.py
build_flags =
lib_deps = 

[s3core]
platform = espressif32
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
extra_scripts = 
    ${base.extra_scripts}
build_flags =
    ${base.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DSERIAL_SPEED=${s3core.monitor_speed}
    -DNAMESPACE='${secret.namespace}'
    ; -DCORE_DEBUG_LEVEL=0
    ; -DDB_LVL=0xFF
    ; -DLOG_SERIAL=Serial
; monitor_filters = esp32_exception_decoder
; build_type = debug
lib_deps = 
    ${base.lib_deps}
    TaskScheduler=https://github.com/arkhipenko/TaskScheduler
test_ignore = test_native

[m5stack]
extends = s3core
build_flags =
    ${s3core.build_flags}
    -DESP32S3=1
    -DIS_M5=1
lib_deps =
    ${s3core.lib_deps}
    M5Unified=https://github.com/m5stack/M5Unified

[env:m5stack-atoms3-lite]
extends = m5stack
board = m5stack-atoms3
build_flags =
    ${m5stack.build_flags}
    -DBUILD="m5stack-atoms3-lite"
    -DDB_LVL=0xFF
    -DLOG_SERIAL=Serial
    -DHAVE_RTC=0
;     -DCORE_DEBUG_LEVEL=5
; monitor_filters = esp32_exception_decoder
; build_type = debug

[env:native]
platform = native
test_ignore = test_embedded
extra_scripts = 
    ${base.extra_scripts}
test_build_src = true
build_flags =
    ${base.build_flags}
    -g
    -DHAVE_RTC=0
    -DLOG_STDOUT=1
    -DDB_LVL=0xFF
lib_deps =
    ${base.lib_deps}
lib_compat_mode = off
